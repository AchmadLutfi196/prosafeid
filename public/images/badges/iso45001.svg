<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Definitions for gradients and text paths -->
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <path id="textPathTop" d="M 30,100 A 70,70 0 0,1 170,100" />
    <path id="textPathBottom" d="M 170,100 A 70,70 0 0,1 30,100" />
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#FF851B" stroke-width="4" />
  <circle cx="100" cy="100" r="82" fill="url(#navyGrad)" />
  <circle cx="100" cy="100" r="74" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="4,3" />
  
  <!-- Center Shield or Star & Checkmark -->
  <path d="M 100,50 L 125,62 L 125,95 C 125,115 100,130 100,130 C 100,130 75,115 75,95 L 75,62 Z" fill="#FFFFFF" opacity="0.15" />
  
  <!-- Center Text -->
  <text x="100" y="92" font-family="'Poppins', 'Arial', sans-serif" font-weight="900" font-size="24" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">ISO</text>
  <text x="100" y="118" font-family="'Poppins', 'Arial', sans-serif" font-weight="800" font-size="20" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">45001:2018</text>
  
  <!-- Curved Text -->
  <text font-family="'Open Sans', 'Arial', sans-serif" font-size="7.5" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">
    <textPath href="#textPathTop" startOffset="50%" text-anchor="middle">OCCUPATIONAL HEALTH &amp; SAFETY</textPath>
  </text>
  <text font-family="'Open Sans', 'Arial', sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF" letter-spacing="1">
    <textPath href="#textPathBottom" startOffset="50%" text-anchor="middle">★ CERTIFIED SYSTEM ★</textPath>
  </text>
</svg>
